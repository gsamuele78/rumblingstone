      srd_basis: [ "+1 Warhammer Bane vs Giant (SRD) price calc" ]
    - name: "Barda del Difensore"
      price: 4650
      tier: medium_lesser
      desc: "Full Plate +1 con dwarvencraft. Peso −10%. Reduces check penalty by 1
