# ─────────────────────────────────────────────────────────────
# FACTION SIGNATURE ITEMS — costruiti ESCLUSIVAMENTE da blocchi SRD.
# Ogni item cita le spell/meccaniche SRD da cui deriva il potere.
# Niente contenuto copyrighted FRCS/MM/RHoD.
# ─────────────────────────────────────────────────────────────
faction_signatures:
  drow-sonjak:
    - name: "Piwafwi della Nebbia"
      price: 8500
      tier: medium_lesser
      desc: "Mantello drow nero-inchiostro tessuto nelle gallerie profonde. +2 a tutti
        i TS; 1/giorno come standard action evoca una nube di foschia (vedi SRD
        Obscuring Mist, CL 5) attorno al portatore."
      srd_basis:
        [
          "Cloak of Resistance +2 (SRD DMG)",
          "Obscuring Mist 1st lvl SRD (1/day CL 5)",
        ]
    - name: "Lama-ragno di Sonjak"
      price: 10315
      tier: medium_lesser
      desc: "Rapier drow con rune a forma di ragno. +1 keen. Avvelenata 1/giorno come
        Greater Magic Weapon: il colpo infligge Drow Poison (SRD: Con 1 dose)."
      srd_basis: [ "+1 Keen Rapier (SRD)", "Drow Poison (SRD DMG p.297)" ]
    - name: "Anello di Ragnatela"
      price: 5400
      tier: minor_greater
      desc: "1/giorno lancia Web (SRD 2nd lvl, CL 5). Centrato sul portatore."
      srd_basis: [ "Web 2nd lvl SRD (1/day CL 5)" ]

  red-hand:
    - name: "Lama del Ruggito (Roaring Blade)"
      price: 8315
      tier: medium_lesser
      desc: "Longsword hobgoblin marchiata con la mano rossa di Tiamat. +1 Flaming: il
        colpo divampa di fuoco draconico."
      srd_basis: [ "+1 Flaming Longsword (SRD)" ]
    - name: "Elmo del Wyrmlord"
      price: 12000
      tier: medium_greater
      desc: "Elmo cornuto. +2 Fear Aura 1/giorno (gli alleati Red Hand immuni): gli
        avversari entro 30 ft devono TS Volontà CD 14 o sono scossi per 3d6
        turni. Basato su Cause Fear SRD."
      srd_basis: [ "Cause Fear 1st lvl SRD (1/day CL 5)", "+2 helmet slot" ]

  drow-sonjak-ritual:
    # more expensive Sonjak/Sajak signature
    - name: "Teschio-reliquiario di Lolth"
      price: 22000
      tier: major_lesser
      desc: "Teschio di drow trasformato in focus divino. 3/giorno: Bestow Curse (SRD
        4th lvl). Richiede evil alignment."
      srd_basis: [ "Bestow Curse SRD (3/day CL 9)" ]

  githyanki-vaereth:
    - name: "Frammento di Silver Sword"
      price: 18000
      tier: major_lesser
      desc: "Scheggia argentea di lama githyanki. +2 Greatsword, Bane vs Outsiders
        (SRD bane: +2 enhancement ulteriore + 2d6 extra vs Outsiders, inclusi
        devils e demons)."
      srd_basis: [ "+2 Greatsword (SRD)", "Bane weapon property vs Outsiders (SRD DMG)" ]
    - name: "Plate Astrale"
      price: 15000
      tier: medium_greater
      desc: "Plate +2 con rune githyanki. Aura Resistance 10 acid 1/giorno (SRD Resist
        Energy)."
      srd_basis: [ "+2 Full Plate (SRD)", "Resist Energy SRD 2nd lvl (1/day)" ]

  rakshasa:
