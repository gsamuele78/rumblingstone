      srd_basis: [ "+1 Full Plate (SRD)", "Dwarvencraft quality (SRD equivalent)" ]

  rethmar-defender:
    - name: "Torcia del Tonante"
      price: 3000
      tier: minor_greater
      desc: "Bastone d'argento di Tempestas. 3/giorno: Shocking Grasp (SRD 1st, CL 5,
        1d6+5/lvl max +5)."
      srd_basis: [ "Wand-equivalent Shocking Grasp SRD 1st (3/day CL 5)" ]
    - name: "Brassard di Lorana"
      price: 6000
      tier: medium_lesser
      desc: "Bracciale araldico del Consiglio di Rethmar. +2 Sacred bonus vs fear (SRD
        Bless continuous-like effect, limited)."
      srd_basis: [ "Cloak of Resistance equivalent narrow vs fear (SRD schema)" ]

  hammerfist-hero:
    - name: "Elmo Ferropugno"
      price: 8000
      tier: medium_lesser
      desc: "Elmo d'acciaio. +2 enhancement Con (SRD Amulet of Health effect nel
        headgear slot, prezzo x1.5 per off-slot)."
      srd_basis: [ "Amulet of Health +2 SRD (off-slot x1.5)" ]

# ─────────────────────────────────────────────────────────────
# FR-THEMED MILD — oggetti con flavor Forgotten Realms ma poteri SRD-compatibili.
# Solo roba LITE e non game-breaking per un party APL 13.
