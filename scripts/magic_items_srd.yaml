# magic_items_srd.yaml — Magic item pools for suggest_loot.py
#
# Two sections:
#  1. srd_items: pure SRD (DMG 3.5 Chapter 7) magic items, grouped by tier.
#  2. faction_signatures: campaign-custom items BUILT FROM SRD meccaniche
#     (spell DC, enchant bonus, creation rules). Flavor text originale.
#     NESSUN contenuto FRCS/MM/RHoD riprodotto verbatim.
#  3. fr_themed_mild: oggetti Forgotten Realms-themed LITE (flavor lore FR ma
#     meccaniche SRD, potere moderato, non game-breaking per APL 13).
#
# Each item has:
#   name, price (gp), tier, desc (flavor, original),
#   srd_basis (list of SRD building-blocks used — REQUIRED for faction + FR items)

