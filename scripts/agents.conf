# scripts/agents.conf — single source of truth for the agent matrix.
#
# Sourced by build-skills.sh and sync-skills.sh. Editing this file is the
# only place to add, remove, or rename an agent. Bash 4+ associative arrays.
#
# AGENT_FORMAT[<id>]        Preferred reference format produced by compress_skills.py.
#                           Must be one of: compact.md / structured.yaml / machine.json
# AGENT_INSTALL_PATHS[<id>] User-level deploy root. Each skill becomes <root>/<skill>/.
#                           Optional — agents without an entry are not deployed at the user level.
# AGENT_REPO_ROOTS[<id>]    In-repo mirror root used by sync-skills.sh.
#                           Optional — agents without an entry are not synced into the repo.
# AGENT_INDEX_AWARE[<id>]   Set to "1" if and only if the agent's loader actually consumes
#                           index.json. No mainstream loader does today; leave empty.

declare -A AGENT_FORMAT=(
  ["claude"]="compact.md"
  ["gemini"]="structured.yaml"
  ["codex"]="machine.json"
  ["chatgpt"]="compact.md"
  ["cursor"]="machine.json"
  ["windsurf"]="compact.md"
  ["copilot"]="compact.md"
)

declare -A AGENT_INSTALL_PATHS=(
  ["claude"]="${HOME}/.claude/skills"
  ["codex"]="${HOME}/.codex/skills"
  ["cursor"]="${HOME}/.cursor/skills"
  ["windsurf"]="${HOME}/.windsurf/skills"
)

declare -A AGENT_REPO_ROOTS=(
  ["claude"]=".claude/skills"
  ["codex"]=".agents/skills"
  ["cursor"]=".cursor/skills"
  ["windsurf"]=".windsurf/skills"
  ["copilot"]=".github/copilot/skills"
  ["chatgpt"]=".chatgpt/skills"
  ["gemini"]=".gemini/skills"
)

declare -A AGENT_INDEX_AWARE=()
